name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Resolve EmailJS configuration
        env:
          EMAILJS_SERVICE_ID_VAR: ${{ vars.VITE_EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID_VAR: ${{ vars.VITE_EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY_VAR: ${{ vars.VITE_EMAILJS_PUBLIC_KEY }}
          EMAILJS_SERVICE_ID_SECRET: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID_SECRET: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY_SECRET: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
        run: |
          SERVICE_ID="${EMAILJS_SERVICE_ID_VAR:-$EMAILJS_SERVICE_ID_SECRET}"
          TEMPLATE_ID="${EMAILJS_TEMPLATE_ID_VAR:-$EMAILJS_TEMPLATE_ID_SECRET}"
          PUBLIC_KEY="${EMAILJS_PUBLIC_KEY_VAR:-$EMAILJS_PUBLIC_KEY_SECRET}"

          if [ -n "$EMAILJS_SERVICE_ID_VAR" ]; then
            echo "VITE_EMAILJS_SERVICE_ID found in environment/repository variables."
          elif [ -n "$EMAILJS_SERVICE_ID_SECRET" ]; then
            echo "VITE_EMAILJS_SERVICE_ID found in environment/repository secrets."
          else
            echo "::warning::VITE_EMAILJS_SERVICE_ID was not found in vars or secrets."
          fi

          if [ -n "$EMAILJS_TEMPLATE_ID_VAR" ]; then
            echo "VITE_EMAILJS_TEMPLATE_ID found in environment/repository variables."
          elif [ -n "$EMAILJS_TEMPLATE_ID_SECRET" ]; then
            echo "VITE_EMAILJS_TEMPLATE_ID found in environment/repository secrets."
          else
            echo "::warning::VITE_EMAILJS_TEMPLATE_ID was not found in vars or secrets."
          fi

          if [ -n "$EMAILJS_PUBLIC_KEY_VAR" ]; then
            echo "VITE_EMAILJS_PUBLIC_KEY found in environment/repository variables."
          elif [ -n "$EMAILJS_PUBLIC_KEY_SECRET" ]; then
            echo "VITE_EMAILJS_PUBLIC_KEY found in environment/repository secrets."
          else
            echo "::warning::VITE_EMAILJS_PUBLIC_KEY was not found in vars or secrets."
          fi

          echo "VITE_EMAILJS_SERVICE_ID=$SERVICE_ID" >> "$GITHUB_ENV"
          echo "VITE_EMAILJS_TEMPLATE_ID=$TEMPLATE_ID" >> "$GITHUB_ENV"
          echo "VITE_EMAILJS_PUBLIC_KEY=$PUBLIC_KEY" >> "$GITHUB_ENV"

      - name: Verify EmailJS configuration
        run: |
          test -n "$VITE_EMAILJS_SERVICE_ID" || (echo "::error::Missing VITE_EMAILJS_SERVICE_ID" && exit 1)
          test -n "$VITE_EMAILJS_TEMPLATE_ID" || (echo "::error::Missing VITE_EMAILJS_TEMPLATE_ID" && exit 1)
          test -n "$VITE_EMAILJS_PUBLIC_KEY" || (echo "::error::Missing VITE_EMAILJS_PUBLIC_KEY" && exit 1)

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
